apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-ui
  template:
    metadata:
      labels:
        app: load-ui
    spec:
      containers:
        - name: ui
          image: cpu-burner-ui:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: load-ui
spec:
  type: NodePort
  selector:
    app: load-ui
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30098
