apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-burner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cpu-burner
  template:
    metadata:
      labels:
        app: cpu-burner
    spec:
      containers:
        - name: app
          image: cpu-burner:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          # REQUESTS = guaranteed reservation (also what the HPA's percentage is computed against)
          # LIMITS   = ceiling — container is throttled (CPU) or OOM-killed (memory) if it exceeds
          resources:
            requests:
              cpu: 100m         # 0.1 vCPU reserved
              memory: 64Mi
            limits:
              cpu: 500m         # at most 0.5 vCPU
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cpu-burner
spec:
  type: NodePort
  selector:
    app: cpu-burner
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30097
