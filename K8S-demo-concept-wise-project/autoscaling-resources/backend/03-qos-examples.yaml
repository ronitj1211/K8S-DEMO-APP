# Three Pods that demonstrate the three QoS classes.
# Run all three, then:  kubectl get pod -o custom-columns=NAME:.metadata.name,QOS:.status.qosClass
---
# Guaranteed: requests == limits for EVERY container, for both CPU and memory.
apiVersion: v1
kind: Pod
metadata:
  name: qos-guaranteed
  labels: { qos: guaranteed }
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      resources:
        requests: { cpu: 100m, memory: 64Mi }
        limits:   { cpu: 100m, memory: 64Mi }
---
# Burstable: at least one request set, and they're NOT equal to limits.
apiVersion: v1
kind: Pod
metadata:
  name: qos-burstable
  labels: { qos: burstable }
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      resources:
        requests: { cpu: 100m, memory: 64Mi }
        limits:   { cpu: 200m, memory: 128Mi }
---
# BestEffort: NO requests and NO limits anywhere.
# These are the first to be evicted under memory pressure.
apiVersion: v1
kind: Pod
metadata:
  name: qos-besteffort
  labels: { qos: besteffort }
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
