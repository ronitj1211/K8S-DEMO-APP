<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Argo CD Demo</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #ef7b4d; }
    pre { background: #f3f3f3; padding: 12px; border-radius: 6px; }
    button { padding: 8px 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Argo CD Demo</h1>
  <p>This page + the backend it calls are both deployed by Argo CD from the Git repo.</p>
  <p>Edit the YAML in Git, push, and watch Argo CD pick up the change automatically.</p>
  <button onclick="callBackend()">Call backend</button>
  <pre id="out">Click the button.</pre>

  <script>
    async function callBackend() {
      const out = document.getElementById('out');
      try {
        const r = await fetch('http://localhost:30110');
        out.textContent = JSON.stringify(await r.json(), null, 2);
      } catch (e) {
        out.textContent = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
