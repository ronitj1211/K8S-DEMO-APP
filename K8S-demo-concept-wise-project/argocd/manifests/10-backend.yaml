apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: argocd-demo
  labels:
    app: backend
spec:
  replicas: 2          # bump this in Git -> push -> Argo CD scales the Deployment
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: argocd-demo-backend:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: APP_VERSION
              value: "v1"     # change to "v2" in Git to demo a rollout via GitOps
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: argocd-demo
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30110
