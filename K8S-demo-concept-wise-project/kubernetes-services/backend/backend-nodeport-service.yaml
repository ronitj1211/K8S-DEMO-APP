# NodePort: opens a static port on EVERY node in the cluster.
# Reachable from outside the cluster at <NodeIP>:<nodePort>.
apiVersion: v1
kind: Service
metadata:
  name: backend-nodeport
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 80            # in-cluster port
      targetPort: 3000    # container port
      nodePort: 30080     # external port on every node (30000-32767)
