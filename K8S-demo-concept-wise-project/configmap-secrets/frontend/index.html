<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ConfigMap + Secret Demo</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #326ce5; }
    pre { background: #f3f3f3; padding: 12px; border-radius: 6px; }
    input { padding: 6px; width: 100%; }
    button { padding: 8px 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>ConfigMap + Secret Demo</h1>
  <p>The backend reads its config from a ConfigMap and a Secret — both via env vars and a mounted file.</p>
  <label>Backend URL:</label>
  <input id="url" value="http://localhost:30082" />
  <br /><br />
  <button onclick="callBackend()">Call backend</button>
  <pre id="out">Click the button.</pre>

  <script>
    async function callBackend() {
      const url = document.getElementById('url').value;
      const out = document.getElementById('out');
      try {
        const r = await fetch(url);
        out.textContent = JSON.stringify(await r.json(), null, 2);
      } catch (e) {
        out.textContent = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
