# Sensitive values. `stringData` is plain text in the manifest — Kubernetes
# encodes it as base64 when it stores the Secret. This is base64, NOT
# encryption. To get real encryption at rest you must enable encryption
# providers on the cluster (or use an external secret store like Vault).
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
type: Opaque
stringData:
  API_KEY: "super-secret-key-xyz-123"
  DB_PASSWORD: "p@ssw0rd!"
