<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>K8s DaemonSet Demo</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #326ce5; }
    pre { background: #f3f3f3; padding: 12px; border-radius: 6px; }
    input { padding: 6px; width: 100%; }
    button { padding: 8px 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Kubernetes DaemonSet Demo</h1>
  <p>The node-agent runs as one Pod per node. Spam the Service and watch <code>nodeName</code> rotate.</p>
  <label>Agent URL:</label>
  <input id="url" value="http://localhost:30084" />
  <br /><br />
  <button onclick="callAgent()">Call once</button>
  <button onclick="spam(20)">Call 20x</button>
  <pre id="out">Click a button.</pre>

  <script>
    async function callAgent() {
      const url = document.getElementById('url').value;
      const out = document.getElementById('out');
      try {
        const r = await fetch(url);
        out.textContent = JSON.stringify(await r.json(), null, 2);
      } catch (e) {
        out.textContent = 'Error: ' + e.message;
      }
    }
    async function spam(n) {
      const url = document.getElementById('url').value;
      const out = document.getElementById('out');
      const seen = [];
      for (let i = 0; i < n; i++) {
        const j = await (await fetch(url)).json();
        seen.push(j.nodeName);
      }
      out.textContent = 'Nodes hit:\n' + seen.join('\n');
    }
  </script>
</body>
</html>
