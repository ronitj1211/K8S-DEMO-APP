apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-service
  namespace: demo
  labels:
    app: orders-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders-service
  template:
    metadata:
      labels:
        app: orders-service
    spec:
      containers:
        - name: orders             # container_name shows up in Kibana too
          image: orders-service:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: orders-service
  namespace: demo
spec:
  type: NodePort
  selector:
    app: orders-service
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30099
