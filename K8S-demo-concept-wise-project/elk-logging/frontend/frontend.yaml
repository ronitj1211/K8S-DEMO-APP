apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-generator-ui
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-generator-ui
  template:
    metadata:
      labels:
        app: log-generator-ui
    spec:
      containers:
        - name: ui
          image: elk-demo-frontend:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: log-generator-ui
  namespace: demo
spec:
  type: NodePort
  selector:
    app: log-generator-ui
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30091
