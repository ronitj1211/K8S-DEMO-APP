# Demonstrates a multi-container Pod: app container + sidecar log shipper.
# Both containers share the same network namespace and an emptyDir volume.
apiVersion: v1
kind: Pod
metadata:
  name: backend-with-sidecar
  labels:
    app: backend
    variant: multi-container
spec:
  volumes:
    - name: logs
      emptyDir: {}
  containers:
    - name: backend
      image: k8s-demo-backend:1.0
      ports:
        - containerPort: 3000
      volumeMounts:
        - name: logs
          mountPath: /var/log/app
    - name: log-sidecar
      image: busybox:1.36
      command: ["sh", "-c", "while true; do echo \"[sidecar] $(date) tailing /var/log/app\"; sleep 10; done"]
      volumeMounts:
        - name: logs
          mountPath: /var/log/app
