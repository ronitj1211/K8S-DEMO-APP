<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Jobs + RBAC Demo</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #326ce5; }
    pre { background: #f3f3f3; padding: 12px; border-radius: 6px; }
    code { background: #eef; padding: 2px 4px; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>Jobs / CronJobs / Namespaces / RBAC</h1>
  <p>
    This demo is mostly driven from <code>kubectl</code> — the README walks
    you through it. The backend below just confirms which namespace it runs in.
  </p>
  <button onclick="callBackend()">Call backend</button>
  <pre id="out">Click the button.</pre>

  <script>
    async function callBackend() {
      const url = 'http://localhost:30095';
      try {
        const r = await fetch(url);
        document.getElementById('out').textContent = JSON.stringify(await r.json(), null, 2);
      } catch (e) {
        document.getElementById('out').textContent = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
